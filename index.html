<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Nhận Diện Tin Thật, Tin Giả</title>
    <!-- Sử dụng Tailwind CSS CDN để thiết kế giao diện nhanh và đẹp mắt -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Nhúng Google Font 'Quicksand' - Font chữ bo tròn cực kỳ thân thiện với trẻ em -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Thư viện hiệu ứng pháo hoa Confetti khi chiến thắng -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- FontAwesome để lấy các icon sinh động -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f3eae1; /* Màu nền bảng bần ấm áp */
            background-image: radial-gradient(#d5c4b1 1px, transparent 1px);
            background-size: 24px 24px;
            user-select: none;
        }

        /* Giả lập hiệu ứng ghim giấy lên tường gỗ/bảng bần */
        .pinned-card {
            background-color: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
        }

        .pinned-card:hover {
            transform: scale(1.03) rotate(0deg) !important;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(0, 0, 0, 0.15);
        }

        /* Hiệu ứng lượn sóng giả lập văn bản mờ cho học sinh lớp 2 */
        .wavy-line {
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .wavy-line::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: translateX(-100%);
            animation: loading-wave 1.5s infinite;
        }

        @keyframes loading-wave {
            100% { transform: translateX(100%); }
        }

        /* Nút trạng thái nảy mút bong bóng */
        .bouncy-btn {
            transition: transform 0.1s ease, background-color 0.2s ease;
        }
        .bouncy-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden p-4 md:p-6 select-none">

    <!-- TOP HEADER BAR -->
    <header class="w-full max-w-6xl mx-auto flex items-center justify-between bg-white/90 backdrop-blur-sm px-6 py-4 rounded-3xl shadow-md border-2 border-[#b5a28f] mb-4">
        <div class="flex items-center gap-3">
            <span class="text-3xl">🕵️♂️</span>
            <h1 class="text-xl md:text-2xl font-bold text-[#5c4033] tracking-wide">Em nhận diện tin thật, tin giả</h1>
        </div>
        <div class="bg-[#f0c243] text-[#5c4033] px-5 py-2 rounded-2xl font-bold text-lg shadow-sm border border-yellow-500">
            Vòng <span id="current-round-text" class="text-xl font-extrabold">1</span> / 6
        </div>
    </header>

    <!-- MAIN PLAY AREA (Optimized for Landscape view on Tablet) -->
    <main class="w-full max-w-6xl mx-auto flex-grow flex flex-col justify-center items-center gap-6 my-2">
        
        <!-- Theme Badge -->
        <div class="bg-white/80 border border-[#b5a28f] text-lg md:text-xl font-bold text-[#5c4033] px-6 py-2 rounded-full shadow-sm">
            Chủ đề: <span id="round-theme-title" class="text-[#c2410c] font-extrabold">...</span>
        </div>

        <!-- 3 CARDS WORKSPACE (Đây là phần bị thiếu trong ảnh của bạn) -->
        <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full items-stretch">
            <!-- JavaScript sẽ vẽ 3 thẻ bài viết tại đây -->
        </div>

    </main>

    <!-- FOOTER & ACTIONS -->
    <footer class="w-full max-w-6xl mx-auto flex flex-col items-center gap-3 mt-4">
        <!-- Thông báo Trạng thái (Toast ẩn/hiện động) -->
        <div id="status-toast" class="opacity-0 translate-y-2 pointer-events-none transition-all duration-300 bg-red-100 border-2 border-red-400 text-red-700 font-bold px-6 py-3 rounded-2xl flex items-center gap-2 shadow-md">
            <span class="text-xl">⚠️</span>
            <span id="toast-message">Bạn đã phân biệt sai tin giả!</span>
        </div>

        <!-- Nút kiểm tra / Tiến lên -->
        <button id="submit-btn" class="bouncy-btn px-10 py-4 bg-gray-400 text-white font-bold text-xl rounded-2xl shadow-lg border-b-4 border-gray-600 cursor-not-allowed" disabled>
            Hoàn thành
        </button>
    </footer>

    <!-- POPUP CHIẾN THẮNG CHUNG CUỘC -->
    <div id="victory-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-all duration-300">
        <div class="bg-white p-8 rounded-3xl max-w-md w-full mx-4 text-center border-4 border-green-400 shadow-2xl transform scale-90 transition-all duration-300">
            <span class="text-7xl block mb-4">🏆</span>
            <h2 class="text-3xl font-extrabold text-green-600 mb-2">Chúc Mừng Chiến Thắng!</h2>
            <p class="text-gray-600 text-lg mb-6 font-semibold">Bé đã xuất sắc hoàn thành nhiệm vụ và trở thành "Đại Sứ Nhí Chống Tin Giả"!</p>
            <button id="restart-btn" class="bouncy-btn w-full py-4 bg-green-500 hover:bg-green-600 text-white font-extrabold text-xl rounded-2xl shadow-lg border-b-4 border-green-700">
                Chơi lại từ đầu 🔄
            </button>
        </div>
    </div>

    <!-- CODE LOGIC ĐIỀU KHIỂN GAME -->
    <script>
        // 1. Kho dữ liệu nâng cấp gồm 6 màn chơi
        const database = [
            {
                theme: "Động vật quanh ta",
                cards: [
                    {
                        id: 1,
                        title: "Chim cánh cụt là loài chim nhưng không biết bay, chúng bơi và lặn rất giỏi dưới nước.",
                        isTrue: true,
                        image: "🐧", // Sử dụng emoji/icon lớn để bảo đảm không bị lỗi tải link ảnh
                        bgColor: "bg-blue-50"
                    },
                    {
                        id: 2,
                        title: "Thỏ chỉ có thể ăn cà rốt chứ không thể ăn được cỏ hay các loại rau xanh khác.",
                        isTrue: false,
                        image: "🐇",
                        bgColor: "bg-orange-50"
                    },
                    {
                        id: 3,
                        title: "Voi dùng chiếc vòi dài của mình để hút nước và cầm nắm thức ăn đưa vào miệng.",
                        isTrue: true,
                        image: "🐘",
                        bgColor: "bg-gray-50"
                    }
                ]
            },
            {
                theme: "Thiên nhiên & Thời tiết",
                cards: [
                    {
                        id: 4,
                        title: "Cầu vồng sau cơn mưa thực chất chỉ có đúng 3 màu cơ bản là Đỏ, Vàng và Xanh lá cây.",
                        isTrue: false,
                        image: "🌈",
                        bgColor: "bg-purple-50"
                    },
                    {
                        id: 5,
                        title: "Sấm sét thường xuất hiện cùng lúc hoặc ngay trước khi trời có mưa dông lớn.",
                        isTrue: true,
                        image: "⚡",
                        bgColor: "bg-slate-50"
                    },
                    {
                        id: 6,
                        title: "Khi trời mưa dông, nếu chúng ta mở một chiếc ô (dù) màu đỏ thì sét sẽ luôn đánh vào chiếc ô đó.",
                        isTrue: false,
                        image: "☔",
                        bgColor: "bg-red-50"
                    }
                ]
            },
            {
                theme: "Thói quen & Sức khỏe",
                cards: [
                    {
                        id: 7,
                        title: "Đánh răng ít nhất 2 lần mỗi ngày (sáng và tối) giúp bảo vệ răng không bị sâu.",
                        isTrue: true,
                        image: "🪥",
                        bgColor: "bg-teal-50"
                    },
                    {
                        id: 8,
                        title: "Nếu lỡ nuốt hạt dưa hấu vào bụng, hạt sẽ nảy mầm và mọc thành cây dưa hấu trong dạ dày.",
                        isTrue: false,
                        image: "🍉",
                        bgColor: "bg-red-50"
                    },
                    {
                        id: 9,
                        title: "Thức khuya xem điện thoại trong bóng tối sẽ làm mắt bị mỏi và dễ bị cận thị.",
                        isTrue: true,
                        image: "📱",
                        bgColor: "bg-indigo-50"
                    }
                ]
            },
            {
                theme: "Cây cối & Hoa quả",
                cards: [
                    {
                        id: 10,
                        title: "Cây xương rồng là loài cây đặc biệt, chúng hoàn toàn không cần một giọt nước nào vẫn sống được quanh năm.",
                        isTrue: false,
                        image: "🌵",
                        bgColor: "bg-emerald-50"
                    },
                    {
                        id: 11,
                        title: "Quả chuối khi chín sẽ chuyển từ vỏ màu xanh sang màu vàng và có vị ngọt, thơm.",
                        isTrue: true,
                        image: "🍌",
                        bgColor: "bg-yellow-50"
                    },
                    {
                        id: 12,
                        title: "Tất cả các loại nấm mọc hoang trong rừng có màu sắc càng sặc sỡ thì ăn vào càng ngon và bổ dưỡng.",
                        isTrue: false,
                        image: "🍄",
                        bgColor: "bg-rose-50"
                    }
                ]
            },
            {
                theme: "Trái Đất & Vũ trụ",
                cards: [
                    {
                        id: 13,
                        title: "Trái Đất của chúng ta có hình dáng giống như một quả cầu tròn rất lớn.",
                        isTrue: true,
                        image: "🌍",
                        bgColor: "bg-sky-50"
                    },
                    {
                        id: 14,
                        title: "Mặt Trăng chỉ xuất hiện vào ban đêm, chúng ta không bao giờ có thể nhìn thấy Mặt Trăng vào ban ngày.",
                        isTrue: false,
                        image: "🌙",
                        bgColor: "bg-slate-50"
                    },
                    {
                        id: 15,
                        title: "Các ngôi sao thực tế trên bầu trời có hình dáng 5 cánh nhọn giống hệt như hình chúng ta hay vẽ.",
                        isTrue: false,
                        image: "⭐",
                        bgColor: "bg-yellow-50"
                    }
                ]
            },
            {
                theme: "Cuộc sống & An toàn",
                cards: [
                    {
                        id: 16,
                        title: "Giấy và sách vở học tập của chúng ta được sản xuất từ nguyên liệu chính là gỗ cây.",
                        isTrue: true,
                        image: "📚",
                        bgColor: "bg-amber-50"
                    },
                    {
                        id: 17,
                        title: "Ngồi xem tivi thật sát màn hình sẽ giúp mắt chúng ta nhìn rõ hơn và bảo vệ mắt không bị cận thị.",
                        isTrue: false,
                        image: "📺",
                        bgColor: "bg-stone-50"
                    },
                    {
                        id: 18,
                        title: "Khi đi bộ qua đường, chúng ta bắt buộc phải đi vào vạch kẻ trắng và có người lớn dắt tay.",
                        isTrue: true,
                        image: "🚶",
                        bgColor: "bg-green-50"
                    }
                ]
            }
        ];

        // 2. Các biến quản lý trạng thái trò chơi
        let shuffledRounds = [];
        let currentRoundIndex = 0;
        let selectedAnswers = {}; // Lưu trữ dạng: { cardId: 'true'/'false'/null }

        // Hàm xáo trộn mảng bằng thuật toán Fisher-Yates (Đảm bảo không bao giờ lỗi JS)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Khởi động trò chơi
        function initGame() {
            shuffledRounds = shuffleArray(database);
            // Xáo trộn cả thứ tự 3 thẻ bài bên trong mỗi màn chơi
            shuffledRounds.forEach(round => {
                round.cards = shuffleArray(round.cards);
            });
            currentRoundIndex = 0;
            selectedAnswers = {};
            loadRound(currentRoundIndex);
        }

        // Tải một màn chơi (Round) lên màn hình
        function loadRound(index) {
            // Cập nhật thông số hiển thị
            document.getElementById('current-round-text').innerText = index + 1;
            
            const roundData = shuffledRounds[index];
            document.getElementById('round-theme-title').innerText = roundData.theme;

            const container = document.getElementById('cards-container');
            container.innerHTML = ''; // Làm sạch vùng chứa bảng tin cũ

            // Tạo hiệu ứng góc nghiêng ngẫu nhiên nhẹ nhàng cho các thẻ giấy ghim
            const rotations = ['-rotate-1', 'rotate-1', '-rotate-2', 'rotate-2', 'rotate-0'];

            roundData.cards.forEach((card, i) => {
                const rotationClass = rotations[i % rotations.length];
                const currentAnswer = selectedAnswers[card.id] || null;

                // Thiết lập giao diện nút Toggle dựa vào trạng thái đáp án của bé
                let toggleBtnHTML = '';
                if (currentAnswer === null) {
                    toggleBtnHTML = `
                        <button onclick="cycleAnswer(${card.id})" class="bouncy-btn flex items-center gap-2 px-5 py-2.5 rounded-full bg-gray-100 border-2 border-gray-300 text-gray-500 font-bold hover:bg-gray-200">
                            <span>❓</span> Chưa Chọn
                        </button>
                    `;
                } else if (currentAnswer === 'true') {
                    toggleBtnHTML = `
                        <button onclick="cycleAnswer(${card.id})" class="bouncy-btn flex items-center gap-2 px-5 py-2.5 rounded-full bg-emerald-500 border-2 border-emerald-600 text-white font-extrabold shadow-md">
                            <span>✅</span> Tin Thật
                        </button>
                    `;
                } else {
                    toggleBtnHTML = `
                        <button onclick="cycleAnswer(${card.id})" class="bouncy-btn flex items-center gap-2 px-5 py-2.5 rounded-full bg-red-500 border-2 border-red-600 text-white font-extrabold shadow-md">
                            <span>❌</span> Tin Giả
                        </button>
                    `;
                }

                // Vẽ cấu trúc thẻ Pinned Card (Giấy ghim)
                const cardHTML = `
                    <div class="pinned-card ${rotationClass} rounded-3xl p-6 flex flex-col justify-between items-center text-center relative border-t-8 border-[#8b5a2b] ${card.bgColor}">
                        <!-- Ghim bấm giả lập ở trên đầu tờ giấy -->
                        <div class="absolute -top-4 text-2xl filter drop-shadow">📌</div>

                        <!-- Khu vực chuyển đổi trạng thái (Toggle) -->
                        <div class="mb-5 mt-1 w-full flex justify-center">
                            ${toggleBtnHTML}
                        </div>

                        <!-- Khung hình ảnh mô tả đẹp mắt bằng emoji khổng lồ -->
                        <div class="w-28 h-28 bg-white rounded-2xl flex items-center justify-center text-5xl shadow-inner border border-gray-100 mb-4 select-none">
                            ${card.image}
                        </div>

                        <!-- Tiêu đề bảng tin (Rất rõ ràng cho bé lớp 2 đọc) -->
                        <p class="text-[#3b2a20] text-base md:text-lg font-bold leading-snug flex-grow px-2">
                            "${card.title}"
                        </p>

                        <!-- Nội dung giả lập lượn sóng không đọc được chữ -->
                        <div class="w-full mt-5 pt-3 border-t border-dashed border-gray-200">
                            <div class="wavy-line w-full"></div>
                            <div class="wavy-line w-4/5 mx-auto"></div>
                            <div class="wavy-line w-5/6 mx-auto"></div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });

            checkFormValidity();
        }

        // Cơ chế Toggle trạng thái xoay vòng: Chưa chọn (null) -> Thật ('true') -> Giả ('false') -> Chưa chọn (null)
        window.cycleAnswer = function(cardId) {
            const current = selectedAnswers[cardId];
            if (current === undefined || current === null) {
                selectedAnswers[cardId] = 'true';
            } else if (current === 'true') {
                selectedAnswers[cardId] = 'false';
            } else {
                selectedAnswers[cardId] = null;
            }
            // Tải lại giao diện của vòng chơi để cập nhật nút bấm tức thì
            loadRound(currentRoundIndex);
        }

        // Kiểm tra xem bé đã làm đủ 3 thẻ hay chưa để kích hoạt nút "Hoàn thành"
        function checkFormValidity() {
            const currentRoundCards = shuffledRounds[currentRoundIndex].cards;
            let answeredCount = 0;
            currentRoundCards.forEach(card => {
                if (selectedAnswers[card.id] !== undefined && selectedAnswers[card.id] !== null) {
                    answeredCount++;
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            if (answeredCount === 3) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-gray-400', 'border-gray-600', 'cursor-not-allowed');
                submitBtn.classList.add('bg-orange-500', 'hover:bg-orange-600', 'border-orange-700', 'cursor-pointer');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('bg-gray-400', 'border-gray-600', 'cursor-not-allowed');
                submitBtn.classList.remove('bg-orange-500', 'hover:bg-orange-600', 'border-orange-700', 'cursor-pointer');
            }
        }

        // Xử lý sự kiện bấm nút Hoàn thành
        document.getElementById('submit-btn').addEventListener('click', () => {
            const currentRoundCards = shuffledRounds[currentRoundIndex].cards;
            let allCorrect = true;

            currentRoundCards.forEach(card => {
                const answer = selectedAnswers[card.id];
                const userSelectedTrue = (answer === 'true');
                if (userSelectedTrue !== card.isTrue) {
                    allCorrect = false;
                }
            });

            if (allCorrect) {
                // Nếu đúng hết -> Sang màn kế tiếp
                hideToast();
                triggerMiniConfetti();
                
                if (currentRoundIndex < 5) {
                    currentRoundIndex++;
                    setTimeout(() => {
                        loadRound(currentRoundIndex);
                    }, 800);
                } else {
                    // Đã thắng cả 6 màn chơi!
                    showVictoryCelebration();
                }
            } else {
                // Nếu sai bất kỳ câu nào -> Chỉ báo lỗi, giữ nguyên lựa chọn để bé tự sửa đổi
                showToast("Bạn đã phân biệt sai tin giả rồi, bé hãy tự kiểm tra lại nhé!");
            }
        });

        // Hiện thông báo lỗi tự động biến mất sau 4 giây
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('status-toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-2', 'pointer-events-none');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                hideToast();
            }, 4000);
        }

        function hideToast() {
            const toast = document.getElementById('status-toast');
            toast.classList.add('opacity-0', 'translate-y-2', 'pointer-events-none');
        }

        // Bắn pháo hoa nhỏ khi qua được 1 màn
        function triggerMiniConfetti() {
            confetti({
                particleCount: 80,
                spread: 60,
                origin: { y: 0.8 }
            });
        }

        // Bắn pháo hoa bùng nổ khi thắng toàn bộ trò chơi
        function showVictoryCelebration() {
            const modal = document.getElementById('victory-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.remove('scale-90');

            const end = Date.now() + (4 * 1000);
            const colors = ['#bb0000', '#ffffff', '#22c55e', '#facc15'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // Nút chơi lại từ đầu
        document.getElementById('restart-btn').addEventListener('click', () => {
            const modal = document.getElementById('victory-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-90');
            initGame();
        });

        // Khởi tạo chạy trò chơi ngay khi trang load xong
        window.addEventListener('DOMContentLoaded', () => {
            initGame();
        });
    </script>
</body>
</html>
