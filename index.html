<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử Thách Bản Quyền Trí Tuệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f0f2f5;
        }

        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #bcc0c4;
            border-radius: 4px;
        }

        .fb-header {
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .media-panel {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            z-index: 90;
        }
        .media-panel.open {
            transform: translateX(0);
        }

        #taskPanel {
            position: fixed;
            z-index: 110;
        }
        #taskPanelHeader {
            cursor: grab;
        }
        #taskPanelHeader:active {
            cursor: grabbing;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden text-[#050505]">

    <!-- Bảng Thử thách (Nổi trên cùng, có thể kéo thả) -->
    <div id="taskPanel" class="w-80 bg-white rounded-xl shadow-[0_12px_28px_0_rgba(0,0,0,0.2),0_2px_4px_0_rgba(0,0,0,0.1)] border border-gray-200 overflow-hidden" style="top: 80px; left: 20px;">
        <div id="taskPanelHeader" class="bg-[#1877f2] px-4 py-3 flex items-center justify-between text-white select-none">
            <h2 class="font-bold text-lg"><i class="fa-solid fa-clipboard-list mr-2"></i>Thử thách</h2>
            <div id="taskProgress" class="font-semibold text-sm bg-blue-700 px-2 py-1 rounded-lg">1/5</div>
        </div>
        <div class="p-4">
            <p id="taskDescription" class="text-[15px] font-medium text-gray-800 mb-4 leading-snug">...</p>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progressBar" class="bg-[#1877f2] h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Header giả lập Facebook -->
    <header class="fb-header sticky top-0 z-[100] w-full h-[56px] flex items-center justify-between px-4">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-[#1877f2] flex items-center justify-center text-white text-2xl font-bold">f</div>
            <div class="hidden md:flex items-center bg-[#f0f2f5] rounded-full px-3 py-2 w-60">
                <i class="fa-solid fa-magnifying-glass text-gray-500 text-sm"></i>
                <input type="text" placeholder="Tìm kiếm trên Facebook" class="bg-transparent outline-none ml-2 text-[15px] w-full" readonly>
            </div>
        </div>

        <div class="hidden lg:flex items-center gap-2 h-full">
            <div class="w-[110px] h-full flex items-center justify-center border-b-[3px] border-[#1877f2] text-[#1877f2] cursor-pointer">
                <i class="fa-solid fa-house text-2xl"></i>
            </div>
            <div class="w-[110px] h-full flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-xl cursor-pointer transition">
                <i class="fa-solid fa-tv text-2xl"></i>
            </div>
            <div class="w-[110px] h-full flex items-center justify-center text-gray-500 hover:bg-gray-100 rounded-xl cursor-pointer transition">
                <i class="fa-solid fa-users text-2xl"></i>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-full bg-[#e4e6eb] flex items-center justify-center text-gray-900 cursor-pointer hover:bg-[#d8dadf] transition">
                <i class="fa-solid fa-bars text-xl"></i>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#e4e6eb] flex items-center justify-center text-gray-900 cursor-pointer hover:bg-[#d8dadf] transition">
                <i class="fa-solid fa-bell text-xl"></i>
            </div>
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-[#1877f2] cursor-pointer border border-[#1877f2]">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <!-- Layout 3 cột -->
    <div class="flex justify-center mx-auto w-full max-w-[1920px] pt-4 px-0 xl:px-4">
        
        <!-- Cột Trái -->
        <aside class="w-[360px] hidden xl:block shrink-0 px-2 opacity-40 pointer-events-none select-none overflow-y-auto sticky top-[72px]" style="height: calc(100vh - 72px);">
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center text-[#1877f2]"><i class="fa-solid fa-user"></i></div>
                <span class="font-semibold text-[15px]">Tài khoản Học sinh</span>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center text-[#1877f2] text-2xl"><i class="fa-solid fa-user-group"></i></div>
                <span class="font-medium text-[15px]">Bạn bè</span>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center text-[#1877f2] text-2xl"><i class="fa-solid fa-clock-rotate-left"></i></div>
                <span class="font-medium text-[15px]">Kỷ niệm</span>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center text-[#1877f2] text-2xl"><i class="fa-solid fa-bookmark"></i></div>
                <span class="font-medium text-[15px]">Đã lưu</span>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center text-[#1877f2] text-2xl"><i class="fa-solid fa-users-rectangle"></i></div>
                <span class="font-medium text-[15px]">Nhóm</span>
            </div>
            <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer">
                <div class="w-9 h-9 flex items-center justify-center text-[#1877f2] text-2xl"><i class="fa-solid fa-tv"></i></div>
                <span class="font-medium text-[15px]">Video</span>
            </div>
        </aside>

        <!-- Cột Giữa -->
        <main class="w-full max-w-[680px] sm:w-[590px] shrink-0 mx-auto px-0 sm:px-4 flex flex-col items-center">
            
            <div class="w-full bg-white sm:rounded-xl shadow-sm p-3 mb-4">
                <div class="flex gap-2">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-[#1877f2] text-[#1877f2]">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="flex-1">
                        <textarea id="postContent" class="w-full bg-[#f0f2f5] hover:bg-[#e4e6eb] rounded-[20px] px-4 py-2 resize-none outline-none text-[17px] transition-all cursor-pointer" rows="1" placeholder="Em đang nghĩ gì thế? (Hãy nhớ ghi Nguồn- Tên tác giả ở cuối bài nhé!)" onclick="expandComposer()"></textarea>
                    </div>
                </div>

                <div id="composerPreview" class="hidden mt-3 rounded-lg border border-gray-200 p-2 relative bg-gray-50 max-h-[300px] overflow-hidden flex items-center justify-center">
                </div>

                <div class="border-t border-gray-200 mt-3 pt-2 flex items-center justify-between">
                    <button onclick="toggleMediaPanel()" class="flex-1 flex items-center justify-center gap-2 hover:bg-[#f0f2f5] py-2 rounded-lg text-gray-600 font-semibold text-[15px] transition">
                        <i class="fa-solid fa-images text-[#45bd62] text-2xl"></i> Ảnh/Video
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 hover:bg-[#f0f2f5] py-2 rounded-lg text-gray-600 font-semibold text-[15px] transition pointer-events-none opacity-50">
                        <i class="fa-solid fa-user-tag text-[#1877f2] text-2xl"></i> Gắn thẻ
                    </button>
                    <button class="flex-1 flex items-center justify-center gap-2 hover:bg-[#f0f2f5] py-2 rounded-lg text-gray-600 font-semibold text-[15px] transition pointer-events-none opacity-50">
                        <i class="fa-regular fa-face-smile text-[#f7b928] text-2xl"></i> Cảm xúc
                    </button>
                </div>
                
                <div id="composerActions" class="hidden mt-3 w-full">
                    <button onclick="submitPost()" class="w-full bg-[#1877f2] text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition shadow-sm">Đăng</button>
                    <div id="errorMsg" class="text-red-600 bg-red-50 p-2 rounded border border-red-200 text-sm mt-2 hidden text-left font-semibold"></div>
                </div>
            </div>

            <div id="newsfeed" class="w-full flex flex-col gap-4 pb-10">
            </div>
        </main>

        <!-- Cột Phải -->
        <aside class="w-[360px] hidden lg:block shrink-0 px-2 sticky top-[72px] overflow-y-auto" style="height: calc(100vh - 72px);">
            <div class="flex items-center justify-between mb-2 px-2">
                <h3 class="text-[#65676b] font-semibold text-[17px]">Người liên hệ</h3>
                <div class="flex gap-3 text-[#65676b]">
                    <i class="fa-solid fa-video cursor-pointer"></i>
                    <i class="fa-solid fa-magnifying-glass cursor-pointer"></i>
                    <i class="fa-solid fa-ellipsis cursor-pointer"></i>
                </div>
            </div>
            <div id="friendsList" class="flex flex-col">
            </div>
        </aside>
    </div>

    <!-- Bảng Thư viện Phương tiện -->
    <div id="mediaPanel" class="media-panel fixed top-0 right-0 h-full w-[480px] max-w-full bg-white shadow-2xl border-l border-gray-200 flex flex-col z-[150]">
        <div class="flex items-center justify-between p-4 border-b border-gray-200">
            <h2 class="text-xl font-bold text-gray-900">Thêm vào bài viết</h2>
            <button onclick="toggleMediaPanel()" class="w-9 h-9 rounded-full bg-[#e4e6eb] hover:bg-[#d8dadf] flex items-center justify-center transition">
                <i class="fa-solid fa-xmark text-gray-700 text-xl"></i>
            </button>
        </div>
        
        <div class="flex border-b border-gray-200">
            <button id="tabImg" onclick="switchMediaTab('image')" class="flex-1 py-3 text-center font-bold text-[#1877f2] border-b-2 border-[#1877f2] transition">Ảnh</button>
            <button id="tabVid" onclick="switchMediaTab('video')" class="flex-1 py-3 text-center font-semibold text-gray-500 hover:bg-gray-50 transition">Video</button>
        </div>

        <div id="mediaGrid" class="flex-1 overflow-y-auto p-2 bg-[#f0f2f5] grid grid-cols-2 gap-2 content-start">
        </div>
    </div>

    <!-- Lightbox Xem Chi tiết (Phóng to ảnh/video) -->
    <div id="mediaLightbox" class="fixed inset-0 bg-black/90 z-[300] hidden flex-col items-center justify-center backdrop-blur-sm transition-opacity duration-300">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 w-12 h-12 bg-white/20 hover:bg-white/40 rounded-full flex items-center justify-center text-white text-2xl transition z-[310] shadow-lg">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div id="lightboxContent" class="w-full max-w-6xl h-full p-10 flex items-center justify-center relative" onclick="closeLightbox(event)">
            <!-- Nội dung phóng to -->
        </div>
    </div>

    <!-- Popup Thành công -->
    <div id="successPopup" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[200] hidden">
        <div class="bg-white rounded-2xl p-8 max-w-md text-center mx-4 shadow-2xl transform scale-110">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fa-solid fa-check text-5xl text-green-500"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800 mb-4">Tuyệt vời!</h2>
            <p class="text-lg text-gray-600 mb-8 font-medium">Bạn đã hoàn thành xuất sắc tất cả nhiệm vụ và biết cách tôn trọng quyền tác giả trên mạng xã hội!</p>
            <button onclick="window.location.reload()" class="bg-[#1877f2] text-white font-bold py-3 px-8 rounded-lg shadow-lg hover:bg-blue-700 transition">
                <i class="fa-solid fa-rotate-right mr-2"></i> Chơi lại từ đầu
            </button>
        </div>
    </div>

    <!-- Overlay đã được gỡ bỏ theo yêu cầu -->

    <script>
        // --- 1. DATA ---
        const images = [
            { id: 'img1', title: 'Đêm đầy sao', author: 'Vincent van Gogh', url: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJxcAWJ6r2_5YO0sEyKsPeOr9BjXhcVSKqIi8Sv91ofguM1pb_ifWmjIVEqdMadGHPZ-fFfubcHy0ImtrOvvI-XpBJc5k2Hn1xfvD3kg&s=10' },
            { id: 'img2', title: 'Mona Lisa', author: 'Leonardo da Vinci', url: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRXwwxPH6_3mjUprizg7M8DtzDpUJuOcHnI8t3x0mztWt4OV7j8r2fU3Pa9L-pmx7AlPcUiZbjEi7zcJdNNgtQs6w1T7os1tYLo__BFOg&s=10' },
            { id: 'img3', title: 'Sóng lừng ngoài khơi Kanagawa', author: 'Katsushika Hokusai', url: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvOEEN0Q0yo1FT1eEV6OABHyuNABr3_LzX-g&s' },
            { id: 'img4', title: 'Tiếng thét', author: 'Edvard Munch', url: 'https://upload.wikimedia.org/wikipedia/vi/a/a4/Scr.JPG' },
            { id: 'img5', title: 'Trái Đất mọc từ Mặt Trăng', author: 'William Anders (NASA)', url: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/NASA-Apollo8-Dec24-Earthrise.jpg/330px-NASA-Apollo8-Dec24-Earthrise.jpg' },
            { id: 'img6', title: 'Chú ong hút mật', author: 'Jon Sullivan', url: 'https://news.fondriest.com/wp-content/uploads/2015/06/HoneyBee.jpg' },
            { id: 'img7', title: 'Thiếu nữ bên hoa huệ', author: 'Tô Ngọc Vân', url: './thieunubenhoahue.jpg' },
            { id: 'img8', title: 'Hai thiếu nữ và em bé', author: 'Tô Ngọc Vân', url: './2thieunuvaembe.jpg' },
            { id: 'img10', title: 'Bình văn', author: 'Lê Văn Miến', url: './binhvan.jpg' }
        ];

        const videos = [
            { id: 'vid1', title: 'Video 1', author: 'Sarlar', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/1.mp4#t=0.001,4' },
            { id: 'vid2', title: 'Video 2', author: 'Zethian', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/2.mp4#t=0.001,4' },
            { id: 'vid3', title: 'Video 3', author: 'Riyas', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/3.mp4#t=0.001,4' },
            { id: 'vid4', title: 'Video 4', author: 'Kanenori', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/4.mp4#t=0.001,4' },
            { id: 'vid5', title: 'Video 5', author: 'Nickype', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/5.mp4#t=0.001,4' },
            { id: 'vid6', title: 'Video 6', author: 'Engin Akyurt', url: 'https://raw.githubusercontent.com/huykokukevnnn/quyensohuutritue/main/6.mp4#t=0.001,4' }
        ];

        // --- 2. TẠO TÊN BẠN BÈ ---
        const ho = ["Nguyễn", "Trần", "Lê", "Phạm", "Hoàng", "Huỳnh", "Phan", "Vũ", "Võ", "Đặng", "Bùi", "Đỗ", "Hồ", "Ngô", "Dương", "Lý"];
        const tenDem = ["Văn", "Thị", "Ngọc", "Hoài", "Minh", "Thanh", "Đức", "Thu", "Xuân", "Hải", "Tuấn", "Hồng", "Thúy", "Phương"];
        const ten = ["Anh", "Bảo", "Châu", "Dương", "Giang", "Hà", "Hải", "Huy", "Hương", "Linh", "Long", "Nam", "Nga", "Nhi", "Phúc", "Quyên", "Sơn", "Trang", "Tùng", "Uyên", "Vy", "Yến"];

        function getRandomName() {
            const h = ho[Math.floor(Math.random() * ho.length)];
            const td = tenDem[Math.floor(Math.random() * tenDem.length)];
            const t = ten[Math.floor(Math.random() * ten.length)];
            return `${h} ${td} ${t}`;
        }

        function renderFriends() {
            const list = document.getElementById('friendsList');
            let html = '';
            for(let i = 0; i < 20; i++) {
                html += `
                    <div class="flex items-center gap-3 p-2 hover:bg-gray-200 rounded-lg cursor-pointer transition w-full">
                        <div class="relative">
                            <div class="w-9 h-9 rounded-full bg-[#e4e6eb] flex items-center justify-center text-gray-600">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <div class="absolute bottom-0 right-0 w-3 h-3 bg-[#31a24c] rounded-full border-2 border-[#f0f2f5]"></div>
                        </div>
                        <span class="font-semibold text-[15px] text-[#050505]">${getRandomName()}</span>
                    </div>
                `;
            }
            list.innerHTML = html;
        }

        // --- 3. QUẢN LÝ NHIỆM VỤ ---
        let currentTasks = [];
        let currentTaskIndex = 0;
        let selectedMedia = null;

        function initApp() {
            renderFriends();

            const randomImg = images[Math.floor(Math.random() * images.length)];
            const randomVid = videos[Math.floor(Math.random() * videos.length)];

            const dynamicTasks = [
                { type: 'any_image', text: 'Hãy đăng một bài viết có hình ảnh bất kỳ và trích "Nguồn- [tên tác giả]".' },
                { type: 'any_video', text: 'Hãy đăng một bài viết có video bất kỳ và trích "Nguồn- [tên tác giả]".' },
                { type: 'image_and_video', text: 'Hãy đăng một bài viết vừa có ảnh hoặc video và nhớ ghi "Nguồn- [tên tác giả]".' },
                { type: 'specific_image', text: `Hãy đăng bức tranh "${randomImg.title}" và trích nguồn tác giả của bức tranh đó.`, targetId: randomImg.id, targetAuthor: randomImg.author, targetType: 'image' },
                { type: 'specific_video', text: `Hãy đăng video "${randomVid.title}" và trích nguồn tác giả của video đó.`, targetId: randomVid.id, targetAuthor: randomVid.author, targetType: 'video' }
            ];

            currentTasks = dynamicTasks.sort(() => Math.random() - 0.5);
            currentTaskIndex = 0;
            updateTaskUI();
        }

        function updateTaskUI() {
            document.getElementById('taskProgress').innerText = `${currentTaskIndex + 1}/5`;
            document.getElementById('taskDescription').innerText = currentTasks[currentTaskIndex].text;
            document.getElementById('progressBar').style.width = `${(currentTaskIndex / 5) * 100}%`;
        }

        // --- 4. TƯƠNG TÁC COMPOSER ---
        const composer = document.getElementById('postContent');
        const actions = document.getElementById('composerActions');
        
        function expandComposer() {
            composer.rows = 4;
            composer.classList.add('bg-white', 'border', 'border-gray-300');
            composer.classList.remove('bg-[#f0f2f5]');
            actions.classList.remove('hidden');
        }

        function resetComposer() {
            composer.value = '';
            composer.rows = 1;
            composer.classList.remove('bg-white', 'border', 'border-gray-300');
            composer.classList.add('bg-[#f0f2f5]');
            actions.classList.add('hidden');
            document.getElementById('errorMsg').classList.add('hidden');
            selectedMedia = null;
            document.getElementById('composerPreview').classList.add('hidden');
            document.getElementById('composerPreview').innerHTML = '';
        }

        // --- 5. MEDIA PANEL & LIGHTBOX ---
        const mediaPanel = document.getElementById('mediaPanel');
        const grid = document.getElementById('mediaGrid');

        function toggleMediaPanel() {
            if(mediaPanel.classList.contains('open')) {
                mediaPanel.classList.remove('open');
            } else {
                mediaPanel.classList.add('open');
                switchMediaTab('image');
            }
        }

        function switchMediaTab(type) {
            const tabImg = document.getElementById('tabImg');
            const tabVid = document.getElementById('tabVid');

            if(type === 'image') {
                tabImg.className = "flex-1 py-3 text-center font-bold text-[#1877f2] border-b-2 border-[#1877f2] transition";
                tabVid.className = "flex-1 py-3 text-center font-semibold text-gray-500 hover:bg-gray-50 transition";
                renderMediaGrid(images, 'image');
            } else {
                tabVid.className = "flex-1 py-3 text-center font-bold text-[#1877f2] border-b-2 border-[#1877f2] transition";
                tabImg.className = "flex-1 py-3 text-center font-semibold text-gray-500 hover:bg-gray-50 transition";
                renderMediaGrid(videos, 'video');
            }
        }

        function renderMediaGrid(dataArr, type) {
            grid.innerHTML = '';
            if(dataArr.length === 0) {
                grid.innerHTML = `<div class="col-span-2 text-center text-gray-500 p-4">Chưa có ${type} nào.</div>`;
                return;
            }

            dataArr.forEach(item => {
                let innerHTML = '';
                if(type === 'image') {
                    innerHTML = `
                        <div class="h-32 bg-gray-200 rounded-t-lg overflow-hidden flex items-center justify-center shrink-0">
                            <img src="${item.url}" class="w-full h-full object-contain bg-black">
                        </div>
                    `;
                } else {
                    innerHTML = `
                        <div class="h-32 bg-gray-800 rounded-t-lg overflow-hidden flex items-center justify-center text-white shrink-0 relative group">
                            <video src="${item.url}" class="w-full h-full object-contain" muted loop preload="metadata" onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime=0;"></video>
                            <div class="absolute inset-0 bg-black/30 group-hover:bg-black/0 transition pointer-events-none"></div>
                            <i class="fa-solid fa-play text-3xl absolute opacity-70 group-hover:opacity-0 transition-opacity pointer-events-none"></i>
                        </div>
                    `;
                }

                grid.innerHTML += `
                    <div onclick="selectMedia('${type}', '${item.id}')" class="bg-white rounded-lg shadow-sm border border-gray-200 cursor-pointer hover:shadow-md hover:border-blue-500 transition overflow-hidden flex flex-col min-h-[220px]">
                        ${innerHTML}
                        <div class="p-3 text-[15px] flex-1 flex flex-col">
                            <div class="font-bold text-gray-900 leading-snug mb-1">${item.title}</div>
                            <div class="text-sm text-gray-600 font-semibold mt-auto pt-1">Tác giả: <span class="text-[#1877f2]">${item.author}</span></div>
                        </div>
                    </div>
                `;
            });
        }

        function selectMedia(type, id) {
            let data = type === 'image' ? images.find(i => i.id === id) : videos.find(v => v.id === id);
            selectedMedia = { type, data };
            
            const preview = document.getElementById('composerPreview');
            preview.classList.remove('hidden');
            
            if(type === 'image') {
                preview.innerHTML = `
                    <div class="relative w-full">
                        <button onclick="clearMedia(event)" class="absolute top-2 right-2 w-8 h-8 bg-white/80 rounded-full flex items-center justify-center text-gray-700 hover:bg-white border border-gray-300 z-10"><i class="fa-solid fa-xmark"></i></button>
                        <img src="${data.url}" class="w-full max-h-[250px] object-contain rounded bg-black">
                    </div>
                `;
            } else {
                preview.innerHTML = `
                    <div class="relative w-full flex items-center justify-center h-32 bg-gray-800 rounded">
                        <button onclick="clearMedia(event)" class="absolute top-2 right-2 w-8 h-8 bg-white/80 rounded-full flex items-center justify-center text-gray-700 hover:bg-white border border-gray-300 z-10"><i class="fa-solid fa-xmark"></i></button>
                        <video src="${data.url}" class="w-full h-full object-cover opacity-50" preload="metadata"></video>
                        <i class="fa-solid fa-play text-white text-4xl absolute"></i>
                        <span class="absolute bottom-2 left-2 text-white font-bold bg-black/50 px-2 rounded">${data.title}</span>
                    </div>
                `;
            }
            
            expandComposer();
        }

        function clearMedia(e) {
            if(e) e.stopPropagation();
            selectedMedia = null;
            document.getElementById('composerPreview').classList.add('hidden');
            document.getElementById('composerPreview').innerHTML = '';
        }

        function openLightbox(type, url) {
            const lb = document.getElementById('mediaLightbox');
            const content = document.getElementById('lightboxContent');
            lb.classList.remove('hidden');
            lb.classList.add('flex');
            
            if(type === 'image') {
                content.innerHTML = `<img src="${url}" class="max-w-full max-h-full object-contain shadow-2xl rounded-lg" onclick="event.stopPropagation()">`;
            } else {
                content.innerHTML = `<video src="${url}" class="max-w-full max-h-full shadow-2xl rounded-lg" controls autoplay onclick="event.stopPropagation()"></video>`;
            }
        }

        function closeLightbox(e) {
            if(e && e.target.id !== 'mediaLightbox' && e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                return; // Chỉ cho phép đóng khi bấm nền ngoài hoặc nút X
            }
            const lb = document.getElementById('mediaLightbox');
            const content = document.getElementById('lightboxContent');
            lb.classList.add('hidden');
            lb.classList.remove('flex');
            content.innerHTML = ''; // Clear out to stop video
        }

        // --- 6. LOGIC XÁC THỰC (VALIDATION) ---
        function removeAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        function checkAuthorMatch(content, author) {
            const normalizedContent = removeAccents(content).replace(/\s+/g, ' ');
            const normalizedAuthor = removeAccents(author).replace(/\s+/g, ' ');
            return normalizedContent.includes(normalizedAuthor);
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        function submitPost() {
            const content = composer.value.trim();
            const currentTask = currentTasks[currentTaskIndex];
            
            if(!selectedMedia) {
                showError("Bạn chưa đính kèm Ảnh hoặc Video nào!");
                return;
            }

            if(!content) {
                showError("Bạn chưa nhập nội dung bài viết. Đừng quên ghi nguồn nhé!");
                return;
            }

            let isValid = false;
            let requiredAuthor = "";

            if(currentTask.type === 'any_image') {
                if(selectedMedia.type !== 'image') { showError("Nhiệm vụ này cần đăng Hình ảnh!"); return; }
                requiredAuthor = selectedMedia.data.author;
            } 
            else if(currentTask.type === 'any_video') {
                if(selectedMedia.type !== 'video') { showError("Nhiệm vụ này cần đăng Video!"); return; }
                requiredAuthor = selectedMedia.data.author;
            }
            else if(currentTask.type === 'image_and_video') {
                requiredAuthor = selectedMedia.data.author;
            }
            else if(currentTask.type === 'specific_image') {
                if(selectedMedia.type !== 'image' || selectedMedia.data.id !== currentTask.targetId) {
                    showError("Bạn chọn chưa đúng bức tranh được yêu cầu rồi!"); return;
                }
                requiredAuthor = currentTask.targetAuthor;
            }
            else if(currentTask.type === 'specific_video') {
                if(selectedMedia.type !== 'video' || selectedMedia.data.id !== currentTask.targetId) {
                    showError("Bạn chọn chưa đúng video được yêu cầu rồi!"); return;
                }
                requiredAuthor = currentTask.targetAuthor;
            }

            isValid = checkAuthorMatch(content, requiredAuthor);

            if(!isValid) {
                showError("Bạn chưa ghi đúng tên tác giả vào bài viết! Hãy nhớ cú pháp: Nguồn- Tên tác giả");
                return;
            }

            createPost(content, selectedMedia);
            resetComposer();

            currentTaskIndex++;
            if(currentTaskIndex < 5) {
                updateTaskUI();
            } else {
                document.getElementById('progressBar').style.width = `100%`;
                triggerReward();
            }
        }

        function createPost(content, media) {
            const feed = document.getElementById('newsfeed');
            const post = document.createElement('div');
            post.className = "bg-white sm:rounded-xl shadow-sm border border-gray-100 flex flex-col pt-3 pb-2";
            
            const postId = 'post-' + Date.now();
            post.id = postId;

            let mediaHTML = '';
            if(media.type === 'image') {
                mediaHTML = `<img src="${media.data.url}" onclick="openLightbox('image', '${media.data.url}')" class="w-full max-h-[500px] object-contain bg-black mt-2 cursor-pointer hover:opacity-95 transition">`;
            } else {
                mediaHTML = `
                    <div onclick="openLightbox('video', '${media.data.url}')" class="w-full h-64 bg-gray-900 flex items-center justify-center mt-2 relative cursor-pointer hover:opacity-95 transition group">
                        <video src="${media.data.url}" class="w-full h-full object-cover opacity-80" preload="metadata"></video>
                        <i class="fa-solid fa-play text-white text-6xl absolute group-hover:scale-110 transition-transform"></i>
                        <span class="absolute bottom-2 right-2 bg-black/70 text-white text-sm px-2 py-1 rounded shadow">${media.data.title}</span>
                    </div>
                `;
            }

            const safeContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            post.innerHTML = `
                <div class="px-4 flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <div class="w-10 h-10 rounded-full bg-blue-100 border border-[#1877f2] flex items-center justify-center text-[#1877f2]"><i class="fa-solid fa-user"></i></div>
                        <div>
                            <div class="font-bold text-[15px] text-[#050505]">Tài khoản Học sinh</div>
                            <div class="text-xs text-[#65676b] font-medium flex items-center gap-1">Vừa xong <i class="fa-solid fa-earth-americas"></i></div>
                        </div>
                    </div>
                    <div class="text-[#65676b] cursor-pointer w-9 h-9 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fa-solid fa-ellipsis"></i></div>
                </div>
                <div class="px-4 py-1 text-[15px] text-[#050505] whitespace-pre-wrap">${safeContent}</div>
                ${mediaHTML}
                <div class="px-4 mt-3 flex items-center justify-between text-[#65676b] text-[15px] pb-2 border-b border-gray-200">
                    <div class="flex items-center gap-1.5 cursor-pointer hover:underline">
                        <div class="w-5 h-5 bg-[#1877f2] rounded-full flex items-center justify-center text-white text-[10px]"><i class="fa-solid fa-thumbs-up"></i></div>
                        <span id="${postId}-like-count" class="font-medium text-[15px]">0</span>
                    </div>
                    <div class="flex items-center gap-3 cursor-pointer hover:underline">
                        <span id="${postId}-comment-count" class="font-medium text-[15px]">0 bình luận</span>
                    </div>
                </div>
                <div class="px-4 py-1 flex text-[#65676b] font-semibold text-[15px] border-b border-gray-200">
                    <button class="flex-1 py-1.5 hover:bg-gray-100 rounded flex items-center justify-center gap-2"><i class="fa-regular fa-thumbs-up"></i> Thích</button>
                    <button class="flex-1 py-1.5 hover:bg-gray-100 rounded flex items-center justify-center gap-2"><i class="fa-regular fa-comment"></i> Bình luận</button>
                    <button class="flex-1 py-1.5 hover:bg-gray-100 rounded flex items-center justify-center gap-2"><i class="fa-solid fa-share"></i> Chia sẻ</button>
                </div>
                <div id="${postId}-comments" class="px-4 pt-3 pb-1 flex flex-col gap-3"></div>
            `;

            feed.prepend(post);
            simulateInteractions(postId);
        }

        const fakeCommentsData = [
            "Tuyệt vời quá! 🥰", "Bài viết rất hay, cảm ơn em!", "Bức tranh này đẹp quá", "Video thật sự ý nghĩa",
            "Đúng rồi, mình cũng thấy vậy", "Hay quá", "Mình thích bức này nhất!", "Giáo dục bản quyền rất quan trọng",
            "Bạn giỏi quá!", "10 điểm luôn", "Like mạnh 👍", "Rất hữu ích", "Quá xuất sắc!", "Bổ ích lắm nha"
        ];

        function simulateInteractions(postId) {
            let currentLikes = 0;
            const targetLikes = Math.floor(Math.random() * 80) + 20; // 20 - 100 likes
            
            const likeInterval = setInterval(() => {
                if(currentLikes >= targetLikes) {
                    clearInterval(likeInterval);
                    return;
                }
                currentLikes += Math.floor(Math.random() * 3) + 1;
                if(currentLikes > targetLikes) currentLikes = targetLikes;
                
                const likeEl = document.getElementById(`${postId}-like-count`);
                if(likeEl) likeEl.innerText = currentLikes;
            }, Math.random() * 800 + 400);

            const numComments = Math.floor(Math.random() * 3) + 2; // 2-4 comments
            let commentCount = 0;

            for(let i = 0; i < numComments; i++) {
                setTimeout(() => {
                    const commentsContainer = document.getElementById(`${postId}-comments`);
                    if(!commentsContainer) return;
                    
                    const name = getRandomName();
                    const cmtText = fakeCommentsData[Math.floor(Math.random() * fakeCommentsData.length)];
                    
                    const cmtEl = document.createElement('div');
                    cmtEl.className = "flex gap-2 text-[13px] animate-fade-in";
                    
                    cmtEl.innerHTML = `
                        <div class="w-8 h-8 rounded-full bg-[#e4e6eb] flex items-center justify-center text-gray-600 shrink-0 mt-0.5"><i class="fa-solid fa-user"></i></div>
                        <div class="flex-1">
                            <div class="bg-[#f0f2f5] px-3 py-2 rounded-2xl inline-block max-w-[95%]">
                                <span class="font-bold text-[#050505] block leading-tight text-[13px]">${name}</span>
                                <span class="text-[#050505] text-[15px]">${cmtText}</span>
                            </div>
                            <div class="flex gap-4 mt-1 ml-3 text-[12px] font-bold text-[#65676b]">
                                <span class="cursor-pointer hover:underline onclick-like transition-colors">Thích</span>
                                <span class="cursor-pointer hover:underline">Phản hồi</span>
                                <span class="font-normal text-[12px]">Vừa xong</span>
                            </div>
                        </div>
                    `;
                    
                    const likeBtn = cmtEl.querySelector('.onclick-like');
                    likeBtn.addEventListener('click', function() {
                        if(this.classList.contains('text-[#1877f2]')) {
                            this.classList.remove('text-[#1877f2]');
                        } else {
                            this.classList.add('text-[#1877f2]');
                        }
                    });

                    commentsContainer.appendChild(cmtEl);
                    commentCount++;
                    
                    const countEl = document.getElementById(`${postId}-comment-count`);
                    if(countEl) countEl.innerText = `${commentCount} bình luận`;

                }, 3000 + (i * (Math.random() * 2000 + 2000)));
            }
        }

        // --- 7. HIỆU ỨNG THẮNG CUỘC ---
        function triggerReward() {
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 300 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);

            document.getElementById('successPopup').classList.remove('hidden');
        }

        // --- 8. KÉO THẢ TASK PANEL ---
        const taskPanel = document.getElementById('taskPanel');
        const header = document.getElementById('taskPanelHeader');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        header.addEventListener('mousedown', dragStart);
        header.addEventListener('touchstart', dragStart, {passive: false});

        document.addEventListener('mousemove', drag);
        document.addEventListener('touchmove', drag, {passive: false});

        document.addEventListener('mouseup', dragEnd);
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (e.type === "touchstart") {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            } else {
                startX = e.clientX;
                startY = e.clientY;
            }
            initialX = taskPanel.offsetLeft;
            initialY = taskPanel.offsetTop;
            isDragging = true;
            taskPanel.style.cursor = 'grabbing';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            let currentX, currentY;
            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX;
                currentY = e.touches[0].clientY;
            } else {
                currentX = e.clientX;
                currentY = e.clientY;
            }

            let dx = currentX - startX;
            let dy = currentY - startY;

            taskPanel.style.left = (initialX + dx) + 'px';
            taskPanel.style.top = (initialY + dy) + 'px';
            taskPanel.style.right = 'auto'; 
        }

        function dragEnd() {
            isDragging = false;
            taskPanel.style.cursor = 'default';
        }

        // Khởi động
        window.onload = initApp;
    </script>
</body>
</html>
